<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טפסים</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232c5f4a' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z'/%3E%3Cpolyline points='14 2 14 8 20 8'/%3E%3Cline x1='16' y1='13' x2='8' y2='13'/%3E%3Cline x1='16' y1='17' x2='8' y2='17'/%3E%3Cpolyline points='10 9 9 9 8 9'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ece4;
    --card-bg: #ffffff;
    --card-hover: #faf8f5;
    --primary: #2c5f4a;
    --primary-light: #3a7d62;
    --accent: #c4956a;
    --accent-light: #ddb68e;
    --text: #2a2a2a;
    --text-muted: #6b6b6b;
    --text-light: #999;
    --border: #e0dbd3;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
    --radius: 14px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30z' fill='none' stroke='%23c4956a' stroke-width='0.3' opacity='0.12'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
  .page { position: relative; z-index: 1; }

  header { background: linear-gradient(135deg, var(--primary) 0%, #1e4435 100%); color: #fff; padding: 36px 24px 32px; text-align: center; position: relative; overflow: hidden; }
  header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, var(--accent), var(--accent-light), var(--accent)); }
  header h1 { font-family: 'Rubik', sans-serif; font-weight: 600; font-size: clamp(1.6rem, 4vw, 2.2rem); letter-spacing: -0.02em; }
  header p { font-weight: 300; font-size: 0.95rem; opacity: 0.8; }

  .header-title-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
  .share-btn { width: 110px; height: 34px; border: 1.5px solid rgba(255,255,255,0.3); border-radius: 10px; background: rgba(255,255,255,0.1); cursor: pointer; color: #fff; display: flex; justify-content: space-evenly; display: flex; align-items: center;  transition: background var(--transition), border-color var(--transition), transform 0.15s; backdrop-filter: blur(4px); padding: 0; }
  .share-btn:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }
  .share-btn:active { transform: scale(0.92); }
  .share-btn svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--primary); color: #fff; font-family: 'Heebo', sans-serif; font-size: 0.88rem; padding: 10px 22px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 100; }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  .header-icon { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; background: rgba(255,255,255,0.12); border-radius: 16px; margin-bottom: 12px; backdrop-filter: blur(4px); }
  .header-icon svg { width: 28px; height: 28px; fill: none; stroke: #fff; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .search-wrap { max-width: 480px; margin: -22px auto 0; padding: 0 20px; position: relative; z-index: 2; }
  .search-box { width: 100%; padding: 14px 44px 14px 18px; border: 2px solid var(--border); border-radius: 12px; background: var(--card-bg); font-family: 'Heebo', sans-serif; font-size: 0.95rem; color: var(--text); box-shadow: var(--shadow); transition: border-color var(--transition), box-shadow var(--transition); outline: none; direction: rtl; }
  .search-box::placeholder { color: var(--text-light); }
  .search-box:focus { border-color: var(--primary); box-shadow: var(--shadow-hover), 0 0 0 3px rgba(44,95,74,0.08); }
  .search-icon { position: absolute; left: 34px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; stroke: var(--text-light); fill: none; stroke-width: 2; pointer-events: none; }

  .grid-container { max-width: 700px; margin: 28px auto 40px; padding: 0 20px; }
  .category-section { margin-bottom: 28px; }
  .category-label { font-family: 'Rubik', sans-serif; font-size: 0.82rem; font-weight: 500; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; padding-right: 4px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }

  .card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition), background var(--transition); text-decoration: none; color: inherit; display: flex; align-items: flex-start; gap: 14px; position: relative; overflow: hidden; animation: cardIn 0.4s ease both; }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--primary-light); background: var(--card-hover); }
  .card:active { transform: translateY(-1px); }
  .card.hidden { display: none; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .card:nth-child(1)  { animation-delay: 0.03s; }
  .card:nth-child(2)  { animation-delay: 0.06s; }
  .card:nth-child(3)  { animation-delay: 0.09s; }
  .card:nth-child(4)  { animation-delay: 0.12s; }
  .card:nth-child(5)  { animation-delay: 0.15s; }
  .card:nth-child(6)  { animation-delay: 0.18s; }
  .card:nth-child(7)  { animation-delay: 0.21s; }
  .card:nth-child(8)  { animation-delay: 0.24s; }
  .card:nth-child(9)  { animation-delay: 0.27s; }
  .card:nth-child(10) { animation-delay: 0.30s; }

  .card-num { flex-shrink: 0; width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-family: 'Rubik', sans-serif; font-weight: 600; font-size: 0.85rem; color: #fff; background: linear-gradient(135deg, var(--primary), var(--primary-light)); transition: background var(--transition); }
  .card:hover .card-num { background: linear-gradient(135deg, var(--accent), var(--accent-light)); }
  .section-sites .card-num { background: linear-gradient(135deg, #3b6d8c, #5a9ab5); }
  .section-sites .card:hover .card-num { background: linear-gradient(135deg, var(--accent), var(--accent-light)); }
  .section-other .card-num { background: linear-gradient(135deg, #8a8a8a, #aaa); }
  .section-other .card:hover .card-num { background: linear-gradient(135deg, var(--accent), var(--accent-light)); }

  .card-body { flex: 1; min-width: 0; }
  .card-title { font-family: 'Rubik', sans-serif; font-weight: 500; font-size: 1rem; line-height: 1.4; margin-bottom: 4px; color: var(--text); }
  .card-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-arrow { position: absolute; left: 16px; top: 50%; transform: translateY(-50%) scaleX(-1); width: 16px; height: 16px; stroke: var(--text-light); fill: none; stroke-width: 2; opacity: 0; transition: opacity var(--transition), left var(--transition); }
  .card:hover .card-arrow { opacity: 1; left: 14px; stroke: var(--primary); }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); display: none; }
  .empty-state.visible { display: block; }
  .empty-state svg { width: 48px; height: 48px; stroke: var(--border); fill: none; stroke-width: 1.5; margin-bottom: 12px; }
  .empty-state p { font-size: 0.95rem; }

  /* ─── Special Clalit card ─── */
  .card-clalit { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 12px; position: relative; overflow: hidden; animation: cardIn 0.4s ease both; transition: transform var(--transition), box-shadow var(--transition); }
  .card-clalit:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--primary-light); background: var(--card-hover); }
  .card-clalit:active { transform: translateY(-1px); }
  .card-clalit.hidden { display: none; }
  .card-clalit::before { content: ''; position: absolute; top: -20px; right: -20px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.07); pointer-events: none; }
  .card-clalit::after { content: ''; position: absolute; bottom: -30px; left: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.05); pointer-events: none; }
  .clalit-header { display: flex; align-items: center; gap: 10px; position: relative; }
  .clalit-icon { flex-shrink: 0; width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(10,140,56,0.95), rgba(37,155,216,0.95)); }
  .clalit-icon svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .clalit-title { font-family: 'Rubik', sans-serif; font-weight: 600; font-size: 1rem; color: var(--text); line-height: 1.3; }
  .clalit-subtitle { font-size: 0.78rem; color: rgba(255,255,255,0.7); line-height: 1.4; }
  .clalit-buttons { display: flex; gap: 8px; position: relative; margin-top: auto; }
  .clalit-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 10px; border-radius: 9px; font-family: 'Heebo', sans-serif; font-size: 0.82rem; text-decoration: none; transition: opacity var(--transition), transform 0.15s; cursor: pointer; }
  .clalit-btn:active { transform: scale(0.97); }
  .clalit-btn-primary { border: 1px solid var(--border); color: var(--text); font-weight: 600; }
  .clalit-btn-primary:hover { background: linear-gradient(135deg, var(--accent), var(--accent-light)); }
  .clalit-btn-secondary { border: 1px solid var(--border); color: var(--text); font-weight: 500; }
  .clalit-btn-secondary:hover { background: linear-gradient(135deg, var(--accent), var(--accent-light)); }
  .clalit-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  .section-divider { border: none; border-top: 1.5px dashed var(--border); margin: 40px 0; }
  footer { text-align: center; padding: 20px; font-size: 0.78rem; color: var(--text-light); }
  @media (max-width: 480px) { header { padding: 28px 16px 24px; } .grid { grid-template-columns: 1fr; gap: 10px; } .card { padding: 16px; } }

  .qr-section { text-align: center; padding: 10px 20px 24px; }
  .qr-img { width: 120px; height: 120px; border-radius: 10px; }
  .qr-label { font-size: 0.78rem; color: var(--text-light); margin-top: 6px; }
</style>
</head>

    <div class="category-section section-other" id="sectionOther">

    </div>
    <div class="empty-state" id="emptyState">

        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>

<script>
const FORMS_RECOMMENDED = [
  { title: "ייפוי כוח ליחיד -  7 עמ'", desc: "טופס יפוי כח רפואי למיופה כח יחיד - גרסה מקוצרת (שרותי בריאות כללית) 7 עמודים", url: "PtOne7" },
  { title: "ייפוי כוח לרבים - 10 עמ'", desc: "טופס יפוי כח רפואי למספר מיופי כח - גרסה מקוצרת (שרותי בריאות כללית) 10 עמודים", url: "PtM10" },
  { title: "מחוק זכויות החולה הנוטה למות", desc: "ייפוי כוח רפואי לפי חוק זכויות החולה הנוטה למות", url: "P2DP" },

  subtitle: "",
  icon: '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  btn1: { label: "טבלה מרכזת", url: "https://clalit.sharepoint.com/:w:/r/sites/North_Nursing/DocLib1/%D7%94%D7%A0%D7%97%D7%99%D7%95%D7%AA%20%D7%A8%D7%A4%D7%95%D7%90%D7%99%D7%95%D7%AA%20%D7%9E%D7%A7%D7%93%D7%99%D7%9E%D7%95%D7%AA%20%D7%95%D7%99%D7%99%D7%A4%D7%95%D7%99%20%D7%9B%D7%95%D7%97/%D7%98%D7%91%D7%9C%D7%94%20%D7%9E%D7%A8%D7%9B%D7%96%D7%AA.docx?d=w18fc3b1cc1a14b65b14cb0c35cb83680&csf=1&web=1&e=z1gB4f" },
  btn2: { label: "הסבר ל-1 ו-2", url: "https://clalit.sharepoint.com/:w:/r/sites/North_Nursing/DocLib1/%D7%94%D7%A0%D7%97%D7%99%D7%95%D7%AA%20%D7%A8%D7%A4%D7%95%D7%90%D7%99%D7%95%D7%AA%20%D7%9E%D7%A7%D7%93%D7%99%D7%9E%D7%95%D7%AA%20%D7%95%D7%99%D7%99%D7%A4%D7%95%D7%99%20%D7%9B%D7%95%D7%97/%D7%99%D7%99%D7%A4%D7%95%D7%99%20%D7%9B%D7%95%D7%97%20-%20%D7%94%D7%A1%D7%91%D7%A8%20%D7%91%D7%A0%D7%95%D7%92%D7%A2%20%D7%9C%D7%98%D7%95%D7%A4%D7%A1.docx?d=w5029af4a1f1f4c69be7af3cf763b28b8&csf=1&web=1&e=5wpRp7" },

  { title: "אתר GOV משרד המשפטים", desc: "סיוע, ייצוג והליכים משפטיים > ייפוי כוח רפואי. כל הטפסים, הסברים וקישור להפקדה", url: "https://www.gov.il/he/service/medical_continuous_power_of_attorney" },
  { title: "אתר GOV משרד הבריאות", desc: "בריאות ורווחה > קופות חולים ושירותים רפואיים > מתן הנחיות רפואיות מקדימות וייפוי כוח", url: "https://www.gov.il/he/service/dying-patient-request" },
  { title: "הנחיות להפקדת ייפוי כוח רפואי", desc: "", url: "https://www.gov.il/blobFolder/service/medical_continuous_power_of_attorney/he/medical-personnel-deposit.pdf" },
];

const FORMS_OTHER = [
  { title: "ייפוי כוח ליחיד -  6 עמ'", desc: "טופס יפוי כח רפואי למיופה כח יחיד - גרסת כללית (https://www.gov.il/BlobFolder/generalpage/05_01_2020/he/dalet%20clalit.pdf) 6 עמודים", url: "PtOne6p" },
  { title: "ייפוי כוח לרבים - 13 עמ'", desc: "טופס יפוי כח רפואי למספר מיופי כח - גרסת אתר משרד המשפטים (האפוטרופוס הכללי) 13 עמודים", url: "P2M13" },
];

// ─── DOM refs ───
const gridRec      = document.getElementById('gridRecommended');
const gridSites    = document.getElementById('gridSites');
const gridOther    = document.getElementById('gridOther');
const sectionRec   = document.getElementById('sectionRecommended');
const sectionSites = document.getElementById('sectionSites');
const sectionOther = document.getElementById('sectionOther');
const labelRec     = document.getElementById('labelRecommended');
const labelSites   = document.getElementById('labelSites');
const labelOther   = document.getElementById('labelOther');
const emptyState   = document.getElementById('emptyState');
const divider1     = document.getElementById('divider1');
const divider2     = document.getElementById('divider2');
const searchInput  = document.getElementById('searchInput');

function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function renderCards(forms, container, startNum) {
  container.innerHTML = '';
  forms.forEach((form, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = form.url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.dataset.title = form.title;
    card.dataset.desc = form.desc || '';
    card.innerHTML = '<div class="card-num">' + (startNum + i) + '</div><div class="card-body"><div class="card-title">' + esc(form.title) + '</div>' + (form.desc ? '<div class="card-desc">' + esc(form.desc) + '</div>' : '') + '</div><svg class="card-arrow" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
    container.appendChild(card);
  });
}

function renderClalitCard(container) {
  const c = CLALIT_CARD;
  const el = document.createElement('div');
  el.className = 'card-clalit';
  el.dataset.title = c.title;
  el.dataset.desc = c.subtitle;
  el.style.animationDelay = (FORMS_RECOMMENDED.length * 0.03 + 0.03) + 's';
  el.innerHTML = '<div class="clalit-header"><div class="clalit-icon"><svg viewBox="0 0 24 24">' + c.icon + '</svg></div><div><div class="clalit-title">' + esc(c.title) + '</div>' + (c.subtitle ? '<div class="clalit-subtitle">' + esc(c.subtitle) + '</div>' : '') + '</div></div><div class="clalit-buttons"><a class="clalit-btn clalit-btn-primary" href="' + esc(c.btn1.url) + '" target="_blank" rel="noopener noreferrer"><span>' + esc(c.btn1.label) + '</span><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a><a class="clalit-btn clalit-btn-secondary" href="' + esc(c.btn2.url) + '" target="_blank" rel="noopener noreferrer"><span>' + esc(c.btn2.label) + '</span><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></a></div>';
  container.appendChild(el);
}

renderCards(FORMS_RECOMMENDED, gridRec, 1);
renderClalitCard(gridRec);
renderCards(OFFICIAL_SITES, gridSites, FORMS_RECOMMENDED.length + 1);
renderCards(FORMS_OTHER, gridOther, FORMS_RECOMMENDED.length + OFFICIAL_SITES.length + 1);

// ─── Search / Filter ───
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let visibleRec = 0, visibleSites = 0, visibleOther = 0;

  gridRec.querySelectorAll('.card, .card-clalit').forEach(card => {
    const match = !q || (card.dataset.title || '').toLowerCase().includes(q) || (card.dataset.desc || '').toLowerCase().includes(q);
    card.classList.toggle('hidden', !match);
    if (match) visibleRec++;
  });
  gridSites.querySelectorAll('.card').forEach(card => {
    const match = !q || (card.dataset.title || '').toLowerCase().includes(q) || (card.dataset.desc || '').toLowerCase().includes(q);
    card.classList.toggle('hidden', !match);
    if (match) visibleSites++;
  });
  gridOther.querySelectorAll('.card').forEach(card => {
    const match = !q || (card.dataset.title || '').toLowerCase().includes(q) || (card.dataset.desc || '').toLowerCase().includes(q);
    card.classList.toggle('hidden', !match);
    if (match) visibleOther++;
  });

  const total = visibleRec + visibleSites + visibleOther;
  sectionRec.style.display   = visibleRec   > 0 ? '' : 'none';
  sectionSites.style.display = visibleSites > 0 ? '' : 'none';
  sectionOther.style.display = visibleOther > 0 ? '' : 'none';
  divider1.style.display = (visibleRec > 0 && visibleSites > 0) ? '' : 'none';
  divider2.style.display = ((visibleRec > 0 || visibleSites > 0) && visibleOther > 0) ? '' : 'none';
  emptyState.classList.toggle('visible', total === 0);

  if (q) {
    labelRec.textContent   = 'טפסים מומלצים (' + visibleRec + ')';
    labelSites.textContent = 'אתרים רשמיים (' + visibleSites + ')';
    labelOther.textContent = 'טפסים אחרים (' + visibleOther + ')';
  } else {
    labelRec.textContent   = 'טפסים מומלצים';
    labelSites.textContent = 'אתרים רשמיים';
    labelOther.textContent = 'טפסים אחרים';
  }
});

// ─── Share button ───
const SHARE_URL   = 'https://geriatry.github.io/MedPower/';
const SHARE_TITLE = 'טפסי ייפוי כוח רפואי';
const SHARE_TEXT  = 'כל הטפסים והקישורים לייפוי כוח רפואי במקום אחד';

document.getElementById('shareBtn').addEventListener('click', async () => {
  if (navigator.share) {
    try { await navigator.share({ title: SHARE_TITLE, text: SHARE_TEXT, url: SHARE_URL }); }
    catch (e) { if (e.name !== 'AbortError') copyFallback(); }
  } else { copyFallback(); }
});

function copyFallback() {
  navigator.clipboard.writeText(SHARE_URL).then(() => showToast('הקישור הועתק ללוח')).catch(() => showToast('לא ניתן להעתיק'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 2200);
}
</script>
